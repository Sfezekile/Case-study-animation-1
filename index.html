<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    
    <div class="phone">
        <div class="blank"></div>
        <div class="container">
            <div class="top">
                <div class="scroll-container">
                    <div class="scroll-item spend"><i class="ri-wallet-3-fill"></i>Spend</div>
                    <div class="scroll-item earn"><i class="ri-btc-fill"></i>Earn</div>
                    <div class="scroll-item save"><i class="ri-circle-fill"></i>Save</div>
                    <div class="scroll-item pay"><i class="ri-flashlight-fill"></i>Pay</div>
                    <div class="scroll-item invest"><i class="ri-brain-4-fill"></i>Invest</div>
                </div>
            </div>
            <div class="bottom">
                <div class="container">
                    <div class="logo">
                        <i class="ri-bank-fill"></i>
                    </div>
                    <div class="content">
                        <h2>Your money, upgrade</h2>
                        <p>Save, earn and invest width stablecoins and digital assets.</p>
                    </div>
                    <div class="cta">
                        <button class="btn-apple"><i class="ri-apple-fill"></i>Continue width Apple</button>
                        <button class="btn-recover"><i class="ri-device-recover-fill"></i>Recover existing wallet</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
